name: Stale

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch: {}

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'security,pinned'
          exempt-pr-labels: 'security,pinned'
          stale-issue-message: >
            This issue has had no activity for 60 days and will be closed in 14 days
            if nothing changes. If it's still relevant, a comment (or just removing the
            `stale` label) keeps it open.
          stale-pr-message: >
            This PR has had no activity for 60 days and will be closed in 14 days if
            nothing changes. Rebasing or commenting keeps it open.
