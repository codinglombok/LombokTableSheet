name: Pages

on:
  push:
    branches: [main]
    paths: ['examples/vanilla/**', 'src/**', 'README.md']
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     # - uses: actions/checkout@v4
   #   - uses: actions/setup-node@v4
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@124145b0a3f972049d56449ddf201016d9b23b49 # v4.0.2
 
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp -r examples/vanilla/* _site/
          mkdir -p _site/dist
          cp -r dist/* _site/dist/
          # examples/vanilla/index.html imports from '../../dist/index.js' for local
          # dev (repo-root-relative); the Pages site layout is flatter, so rewrite
          # to './dist/index.js' in the copied artifact only — source file is untouched.
          sed -i "s#'../../dist/index.js'#'./dist/index.js'#" _site/index.html
     # - uses: actions/upload-pages-artifact@v3
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
