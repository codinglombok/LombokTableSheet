name: Screenshots

on:
  push:
    branches: [main]
    paths: ['examples/vanilla/**', 'src/adapters/dom.ts', 'src/adapters/sheet.ts']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - name: Serve demo and capture screenshot
        run: |
          mkdir -p docs/screenshots
          npx http-server examples/vanilla -p 8080 &
          sleep 2
          node -e "
            const { chromium } = require('playwright');
            (async () => {
              const browser = await chromium.launch();
              const page = await browser.newPage({ viewport: { width: 900, height: 500 } });
              await page.goto('http://localhost:8080');
              await page.waitForSelector('table');
              await page.screenshot({ path: 'docs/screenshots/table-demo.png' });
              await browser.close();
            })();
          "
      - name: Commit updated screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/table-demo.png
          git diff --staged --quiet || git commit -m "chore: update demo screenshot [skip ci]"
          git diff --staged --quiet || git push
