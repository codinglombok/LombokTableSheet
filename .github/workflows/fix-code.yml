name: Fix Code

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.label.name == 'fix-code'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: Auto-fix lint issues (TS)
        run: npm run lint -- --fix --if-present
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Auto-format Go
        working-directory: ports/go
        run: gofmt -w .
      - name: Commit fixes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-fix formatting/lint issues"
          git diff --staged --quiet || git push
